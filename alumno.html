<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Academia PT — Alumno</title>
<style>
  :root{
    --paper:#F7F4EC; --paper-dark:#EFEADC; --ink:#1B2A4A; --ink-soft:#3E4C6B;
    --red:#B23A2E; --red-soft:#E8C9C4; --green:#5C7A5E; --green-soft:#DCE6DC;
    --amber:#9C7A2E; --amber-soft:#EFE1BE; --line:#D8D0BE; --gray:#8B8478;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;font-size:15px;line-height:1.5;}
  .wrap{max-width:760px;margin:0 auto;padding:24px 18px 60px;}
  header{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:18px;}
  header h1{font-family:Georgia,serif;font-weight:700;font-size:22px;margin:0;}
  header .sub{font-size:12.5px;color:var(--gray);font-style:italic;}
  .tabs{display:flex;gap:2px;margin-bottom:18px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .tab{padding:9px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--gray);border-bottom:3px solid transparent;}
  .tab.active{color:var(--ink);border-bottom-color:var(--red);}
  .panel{display:none;} .panel.active{display:block;}
  .card{background:#fff;border:1px solid var(--line);border-radius:3px;padding:18px 20px;margin-bottom:16px;}
  .card h3{font-family:Georgia,serif;font-size:16px;margin:0 0 12px;}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
  label{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);}
  textarea,input[type=file],select{font-family:inherit;font-size:14px;padding:9px 10px;border:1px solid var(--line);border-radius:3px;background:var(--paper);color:var(--ink);width:100%;}
  textarea{min-height:180px;font-family:Georgia,serif;resize:vertical;}
  .btn{font-family:inherit;font-size:13px;font-weight:700;padding:9px 16px;border-radius:3px;border:none;cursor:pointer;background:var(--ink);color:var(--paper);}
  .status{font-size:12.5px;color:var(--gray);margin-top:8px;display:block;}
  .status.ok{color:var(--green);} .status.err{color:var(--red);}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;}
  .pill.pendiente{background:var(--amber-soft);color:var(--amber);}
  .pill.corregido{background:var(--green-soft);color:var(--green);}
  .practico-photo{max-width:100%;border:1px solid var(--line);border-radius:4px;margin:8px 0;display:block;}
  .empty{color:var(--gray);font-style:italic;padding:20px 0;text-align:center;}
  .evento{border-left:3px solid var(--ink-soft);padding:8px 10px;margin-bottom:8px;background:var(--paper);border-radius:0 3px 3px 0;font-size:13px;}
  .evento .meta{color:var(--gray);font-size:12px;margin-top:2px;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--gray);border-bottom:2px solid var(--ink);padding:6px 8px;}
  td{padding:8px;border-bottom:1px solid var(--line);}
  .progreso-select{font-size:12px;padding:4px 6px;}
  .spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--paper-dark);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="academiaNombre">Academia PT</h1>
    <div class="sub" id="alumnoNombre">Cargando...</div>
  </header>

  <div id="sinAlumno" style="display:none;" class="card">
    <p>Este enlace no es válido. Pide a tu preparador que te envíe tu enlace personalizado.</p>
  </div>

  <div id="contenido" style="display:none;">
    <div class="tabs">
      <div class="tab active" data-tab="calendario">Mi calendario</div>
      <div class="tab" data-tab="practicos">Mis prácticos</div>
      <div class="tab" data-tab="temas">Temas</div>
      <div class="tab" data-tab="cultura">Cultura General</div>
    </div>

    <div class="panel active" id="panel-calendario">
      <div class="card">
        <h3>Próximas clases</h3>
        <div id="listaEventos"></div>
        <div class="empty" id="eventosEmpty" style="display:none;">No tienes clases programadas todavía.</div>
      </div>
    </div>

    <div class="panel" id="panel-practicos">
      <div class="card">
        <h3>Enviar un práctico</h3>
        <div class="field"><label>Texto (opcional si subes foto)</label><textarea id="practicoTexto" placeholder="Pega aquí tu supuesto práctico resuelto..."></textarea></div>
        <div class="field"><label>Foto del práctico (opcional)</label><input type="file" id="practicoFoto" accept="image/*"></div>
        <button class="btn" id="btnEnviarPractico">Enviar para corrección</button>
        <span class="status" id="submitStatus"></span>
      </div>
      <div class="card">
        <h3>Historial</h3>
        <div id="listaPracticos"></div>
        <div class="empty" id="practicosEmpty" style="display:none;">Todavía no has enviado ningún práctico.</div>
      </div>
    </div>

    <div class="panel" id="panel-temas"></div>
    <div class="panel" id="panel-cultura"></div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzrEozXfHf41s3QPZTZelrfIuxQ48xs4LAABID3Tmk4JqV0Ys0e_UCGOHlsV5aAAm-w/exec';
const ESTADOS_PROGRESO = ['Pendiente','En estudio','Repasado','Dominado'];
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

let data = { alumnos:[], calendario:[], practicos:[], temas:[], temasProgreso:[], cg:[], cgProgreso:[], ajustes:[] };
let alumnoId = null, alumno = null;

function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function todayISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function uid(pre){ return (pre||'id')+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); }

async function apiGet(action){
  const res = await fetch(API_URL+'?action='+action);
  const text = await res.text();
  try{ return JSON.parse(text); }
  catch(e){ throw new Error('El backend no devolvió JSON. Respuesta: '+text.slice(0,300)); }
}
async function apiPost(action,payload){
  const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({action,payload}) });
  const text = await res.text();
  let json;
  try{ json = JSON.parse(text); } catch(e){ throw new Error('El backend no devolvió JSON al ejecutar "'+action+'". Respuesta: '+text.slice(0,300)); }
  if(json.error) throw new Error(json.error);
  return json;
}
function ajusteVal(clave, fallback){ const a = data.ajustes.find(x=>x.clave===clave); return a?a.valor:fallback; }

async function init(){
  const params = new URLSearchParams(location.search);
  alumnoId = params.get('id');
  try{
    data = await apiGet('getAll');
  }catch(e){
    document.getElementById('alumnoNombre').textContent = '';
    document.getElementById('sinAlumno').style.display='block';
    document.getElementById('sinAlumno').innerHTML = '<p>No se ha podido conectar con el backend.</p><p style="font-size:12px;color:var(--gray);white-space:pre-wrap;">'+e.message+'</p>';
    return;
  }
  document.getElementById('academiaNombre').textContent = ajusteVal('academia','Academia PT');
  alumno = data.alumnos.find(a=>a.id===alumnoId);
  if(!alumno){
    document.getElementById('sinAlumno').style.display='block';
    document.getElementById('alumnoNombre').textContent='';
    return;
  }
  document.getElementById('alumnoNombre').textContent = 'Hola, '+alumno.nombre;
  document.getElementById('contenido').style.display='block';
  renderEventos();
  renderPracticos();
  renderCatalogTab('temas','Temas',data.temas,data.temasProgreso,'temas');
  renderCatalogTab('cultura','Cultura General',data.cg,data.cgProgreso,'cg');
}

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-'+t.dataset.tab).classList.add('active');
  });
});

function formatFecha(iso){
  const [y,m,d]=iso.split('-').map(Number);
  return d+' de '+MESES[m-1]+' de '+y;
}
function renderEventos(){
  const hoy = todayISO();
  const eventos = data.calendario.filter(ev=>ev.alumnoId===alumnoId && ev.fecha>=hoy).sort((a,b)=>String(a.fecha).localeCompare(String(b.fecha)));
  const cont = document.getElementById('listaEventos');
  document.getElementById('eventosEmpty').style.display = eventos.length?'none':'block';
  cont.innerHTML = eventos.map(ev=>`<div class="evento">
    <div><strong>${formatFecha(ev.fecha)}</strong>${ev.hora?(' · '+escapeHtml(ev.hora)):''} — ${escapeHtml(ev.tipo)}</div>
    <div class="meta">${escapeHtml(ev.tema||'')}${ev.notas?(' — '+escapeHtml(ev.notas)):''}</div>
  </div>`).join('');
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = ()=>resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

document.getElementById('btnEnviarPractico').addEventListener('click', async ()=>{
  const st = document.getElementById('submitStatus');
  const texto = document.getElementById('practicoTexto').value.trim();
  const fotoInput = document.getElementById('practicoFoto');
  const file = fotoInput.files[0];
  if(!texto && !file){ st.textContent='Escribe el texto o sube una foto de tu práctico.'; st.className='status err'; return; }
  st.innerHTML = '<span class="spinner"></span> Enviando...'; st.className='status';
  const payload = { id: uid('pr'), alumnoId, fecha: todayISO(), texto };
  if(file){
    payload.fotoBase64 = await fileToBase64(file);
    payload.fotoNombre = file.name;
  }
  await apiPost('addPractico', payload);
  document.getElementById('practicoTexto').value=''; fotoInput.value='';
  st.textContent='Práctico enviado. Tu preparador lo revisará pronto.'; st.className='status ok';
  data = await apiGet('getAll');
  renderPracticos();
});

function renderPracticos(){
  const mios = data.practicos.filter(p=>p.alumnoId===alumnoId).sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)));
  document.getElementById('practicosEmpty').style.display = mios.length?'none':'block';
  document.getElementById('listaPracticos').innerHTML = mios.map(p=>{
    let html = `<div class="card" style="margin-bottom:10px;">
      <div><strong>${escapeHtml(p.fecha)}</strong> <span class="pill ${p.estado}">${p.estado==='pendiente'?'Pendiente de corrección':'Corregido'}</span></div>`;
    if(p.fotoUrl) html += `<img class="practico-photo" src="${escapeHtml(p.fotoUrl)}">`;
    if(p.estado==='corregido'){
      html += `<div class="hint" style="margin-top:8px;font-size:12px;color:var(--gray);">Feedback de tu preparador:</div>
      <div style="white-space:pre-wrap;font-size:13.5px;background:var(--paper);padding:10px;border-radius:3px;margin-top:6px;">${escapeHtml(p.feedback)}</div>`;
    }
    html += '</div>';
    return html;
  }).join('');
}

function renderCatalogTab(prefix, titulo, catalogo, progreso, tipo){
  const panel = document.getElementById('panel-'+prefix);
  panel.innerHTML = `<div class="card">
    <h3>${titulo}</h3>
    <div class="hint" style="margin-top:0;color:var(--gray);font-size:12px;">Marca tu nivel de estudio en cada tema para llevar el ritmo.</div>
    <table><thead><tr><th>Nº</th><th>Título</th><th>Tu progreso</th></tr></thead><tbody id="${prefix}Tbody"></tbody></table>
    <div class="empty" id="${prefix}Empty" style="display:none;">Tu preparador todavía no ha cargado el temario.</div>
  </div>`;
  const tbody = document.getElementById(prefix+'Tbody');
  document.getElementById(prefix+'Empty').style.display = catalogo.length?'none':'block';
  catalogo.slice().sort((a,b)=>String(a.numero||'').localeCompare(String(b.numero||''),undefined,{numeric:true})).forEach(t=>{
    const reg = progreso.find(x=>x.alumnoId===alumnoId && x.temaId===t.id);
    const estado = reg?reg.estado:'Pendiente';
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${escapeHtml(t.numero||'')}</td><td>${escapeHtml(t.titulo)}</td>
      <td><select class="progreso-select" data-tema="${t.id}">${ESTADOS_PROGRESO.map(e=>'<option'+(e===estado?' selected':'')+'>'+e+'</option>').join('')}</select></td>`;
    tr.querySelector('select').addEventListener('change', async e=>{
      await apiPost('setProgreso', { alumnoId, temaId:t.id, estado:e.target.value, tipo });
      data = await apiGet('getAll');
    });
    tbody.appendChild(tr);
  });
}

init();
</script>
</body>
</html>
